name: daily

on:
  schedule:
    # 6 PM PT: run at both 01:00 UTC (PDT) and 02:00 UTC (PST) to handle DST.
    # The job is idempotent on same-day reruns via history dedupe.
    - cron: '0 1 * * *'
    - cron: '0 2 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: read

concurrency:
  group: daily-run
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Poll verdicts & subscriptions from issue comments
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          VERDICTS_ISSUE_NUMBER: ${{ vars.VERDICTS_ISSUE_NUMBER }}
          SUBSCRIPTIONS_ISSUE_NUMBER: ${{ vars.SUBSCRIPTIONS_ISSUE_NUMBER }}
        run: node scripts/poll-verdicts.mjs

      - name: Daily scrape + push
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: node scripts/daily-run.mjs

      - name: Commit updated /data
        run: |
          git config user.name "house-hunt-bot"
          git config user.email "house-hunt-bot@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes"
          else
            git commit -m "chore(data): daily run $(date -u +%Y-%m-%d)"
            git push
          fi
